workflows:
  ios-build:
    name: OTPApp iOS
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_SCHEME: "OTPApp"
      xcode: latest
    scripts:
      - name: Install Tuist (Homebrew)
        script: |
          set -e
          brew tap tuist/tuist
          brew install tuist
          tuist version
      - name: Generate Xcode project
        script: |
          set -e
          export PATH="$HOME/.tuist/bin:$PATH"
          tuist generate --no-open
      - name: Build .app and package .ipa (unsigned)
        script: |
          set -e
          xcodebuild -project OTPApp.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            only_active_arch=NO \
            build
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "OTPApp.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r OTPApp.ipa Payload
          cd -
    artifacts:
      - build/ios/ipa/OTPApp.ipa
