# Codemagic build config for OTPApp (iOS)
# Free tier: sign in at https://codemagic.io with your GitHub account,
# add this repo, and start a build. Download the .ipa from the build artifacts,
# then install it with Sideloadly on your Windows PC.
#
# NOTE: This produces a build artifact IPA. Final signing for your device is
# done by Sideloadly on Windows using your free Apple ID.

workflows:
  ios-build:
    name: OTPApp iOS
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "OTPApp.xcodeproj"
        XCODE_SCHEME: "OTPApp"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Show repo layout
        script: |
          pwd
          ls -la
          ls -la OTPApp.xcodeproj
      - name: Build .app and package .ipa (unsigned)
        script: |
          set -e
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            only_active_arch=NO \
            build
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "OTPApp.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r OTPApp.ipa Payload
          cd -
    artifacts:
      - build/ios/ipa/OTPApp.ipa
