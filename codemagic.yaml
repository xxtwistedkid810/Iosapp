workflows:
  ios-build:
    name: OTPApp iOS
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_SCHEME: "OTPApp"
        BUNDLE_ID: "com.example.OTPApp"
      xcode: "15.3"
      # Set these as Codemagic secrets (use a throwaway Apple ID, NOT your real one):
      #   APPLE_ID       -> email of a free throwaway Apple account
      #   APPLE_PASSWORD -> its password (or app-specific password)
      #   APPLE_TEAM_ID  -> optional; Codemagic can auto-detect
    scripts:
      - name: Install XcodeGen
        script: |
          set -e
          brew install xcodegen
          xcodegen version
      - name: Generate Xcode project
        script: |
          set -e
          xcodegen generate
      - name: Build .app and package .ipa (unsigned)
        script: |
          set -e
          xcodebuild -project OTPApp.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            only_active_arch=NO \
            build
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "OTPApp.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r OTPApp.ipa Payload
          cd -
    artifacts:
      - build/ios/ipa/OTPApp.ipa
